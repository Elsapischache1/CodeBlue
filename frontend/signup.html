<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Guard - Signup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #A8D5BA, #1B5E3A);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .internal-header { margin-bottom: 1.5rem; }

        .header-logo {
            width: 120px;
            height: auto;
            margin-bottom: 0.5rem;
            border-radius: 12px;
        }

        h2 {
            color: white;
            margin: 0;
            font-size: 1.8rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 6px rgba(46,125,50,0.4);
            outline: none;
        }

        h3 {
            margin-top: 1.5rem;
            color: #388e3c;
            font-size: 1.1rem;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
        }

        .check-card {
            background: #f1f8e9;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .check-card input { width: auto; margin-right: 8px; }

        .check-card:hover {
            background: #c8e6c9;
            border-color: #2e7d32;
        }

        /* Styling for the dynamic add button */
        .btn-add-med {
            background: none;
            border: 1px dashed #1B5E3A;
            color: #1B5E3A;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0 20px;
            transition: 0.3s;
        }

        .btn-add-med:hover { background: #f0fdf4; }

        .btn-primary {
            background: #1B5E3A;
            color: #fff;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #2E7D5C;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="internal-header">
            <a href="home.html">
                <img src="logo.png" class="header-logo" alt="Air Guard Logo">
            </a>
            <h2>Create Account</h2>
        </div>

        <form id="signupForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <h3>Select Triggers</h3>
            <div class="selection-grid">
                <label class="check-card"><input type="checkbox" value="Pollen"> Pollen</label>
                <label class="check-card"><input type="checkbox" value="Pet Danders"> Pet Danders</label>
                <label class="check-card"><input type="checkbox" value="Mold"> Mold</label>
                <label class="check-card"><input type="checkbox" value="Dust Mites"> Dust Mites</label>
                <label class="check-card"><input type="checkbox" value="Smoke"> Smoke</label>
                <label class="check-card"><input type="checkbox" value="Perfume"> Perfume</label>
                <label class="check-card"><input type="checkbox" value="Food"> Food</label>
            </div>

            <h3>Medicine Schedule</h3>
            <div id="med-input-list">
                <div class="med-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" placeholder="Medication Name" class="med-name" style="flex: 2;">
                    <input type="time" class="med-time" style="flex: 1;"> 
                </div>
            </div>

            <button type="button" class="btn-add-med" onclick="addNewMedRow()">+ Add Another Medication</button>

            <button type="submit" class="btn-primary">Finish & Start Assessment</button>
        </form>
    </div>

    <script>
        // Function to create and append a new row of inputs
        function addNewMedRow() {
            const container = document.getElementById('med-input-list');
            const row = document.createElement('div');
            row.className = 'med-row';
            row.style.display = 'flex';
            row.style.gap = '10px';
            row.style.marginBottom = '10px';
            row.innerHTML = `
                <input type="text" placeholder="Medication Name" class="med-name" style="flex: 2;">
                <input type="time" class="med-time" style="flex: 1;">
            `;
            container.appendChild(row);
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value;
            let registeredEmails = JSON.parse(localStorage.getItem("all_registered_emails")) || [];
            
            if (registeredEmails.includes(email)) {
                alert("This email is already registered!");
                return;
            }

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Capture all medications from all rows
            const medications = [];
            const rows = document.querySelectorAll('.med-row');
            rows.forEach(row => {
                const name = row.querySelector('.med-name').value;
                const time = row.querySelector('.med-time').value;
                if (name && time) {
                    medications.push({ name: name, time: time });
                }
            });

            const allergens = [];
            document.querySelectorAll('.selection-grid input[type="checkbox"]:checked').forEach(cb => {
                allergens.push(cb.value);
            });

            // Store everything
            localStorage.setItem("username", username);
            localStorage.setItem("email", email);
            localStorage.setItem("password", password);
            localStorage.setItem("allergens", JSON.stringify(allergens));
            localStorage.setItem("medications", JSON.stringify(medications));

            registeredEmails.push(email);
            localStorage.setItem("all_registered_emails", JSON.stringify(registeredEmails));

            window.location.href = 'risk.html';
        });
    </script>
</body>
</html>
