<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Guard - Signup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #a5d6a7);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card-container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .internal-header {
            margin-bottom: 1.5rem;
        }

        .header-logo {
            width: 120px;
            margin-bottom: 0.5rem;
            height: 60px;
            object-fit: cover;     /* ensures cropping */
            border-radius: 12px;   /* smooth rounded edges */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* optional shadow */
        }

        h2 {
            color:white;
            margin: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 6px rgba(46,125,50,0.4);
            outline: none;
        }

        h3 {
            margin-top: 1.5rem;
            color: #388e3c;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
        }

        .check-card {
            background: #f1f8e9;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .check-card:hover {
            background: #c8e6c9;
        }

        .btn-primary {
            margin-top: 1.5rem;
            background: #2e7d32;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #1b5e20;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="internal-header">
            <img src="logo.png" class="header-logo" alt="Air Guard Logo">
            <h2>Create Account</h2>
        </div>

        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <h3>Select Triggers</h3>
        <div class="selection-grid">
            <label class="check-card"><input type="checkbox"> Pollen</label>
            <label class="check-card"><input type="checkbox"> Pet Danders</label>
            <label class="check-card"><input type="checkbox"> Mold</label>
            <label class="check-card"><input type="checkbox"> Dust Mites</label>
            <label class="check-card"><input type="checkbox"> Smoke</label>
            <label class="check-card"><input type="checkbox"> Perfume</label>
            <label class="check-card"><input type="checkbox"> Food</label>
        </div>

        <button onclick="location.href='risk.html'" class="btn-primary">Finish & Start Assessment</button>
    </div>
</body>
</html>
