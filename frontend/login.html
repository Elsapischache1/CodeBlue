<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Guard - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #A8D5BA, #1B5E3A);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card-container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .internal-header { margin-bottom: 1.5rem; }
        .header-logo { width: 100px; border-radius: 12px; margin-bottom: 0.5rem; }
        h2 { color:white ; margin: 0; font-size: 1.8rem; }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ccc; border-radius: 8px;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: #2e7d32; box-shadow: 0 0 6px rgba(46,125,50,0.4); outline: none; }

        .med-update-section {
            margin-top: 15px;
            padding: 15px;
            background: #f1f8e9;
            border: 1px dashed #2e7d32;
            border-radius: 10px;
            text-align: left;
        }

        .med-update-section label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #2e7d32;
            display: block;
            margin-bottom: 8px;
        }

        .btn-add-med {
            background: none;
            border: 1px dashed #1B5E3A;
            color: #1B5E3A;
            padding: 8px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px 0 10px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-add-med:hover { background: #e8f5e9; }

        .btn-primary {
            margin-top: 1.5rem;
            background: #1B5E3A;
            color: #fff;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover { background: #2E7D5C; transform: translateY(-2px); }
        .footer-link { margin-top: 25px; font-size: 0.9rem; color: #666; }
        .footer-link a { color: #2e7d32; text-decoration: none; font-weight: bold; }

        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="internal-header">
            <a href="home.html"><img src="logo.png" class="header-logo" alt="Air Guard Logo"></a>
            <h2>Welcome Back</h2>
        </div>

        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            
            <div class="med-update-section">
                <label>Add New Medications (Optional)</label>
                <div id="login-med-input-list">
                    <div class="med-row" style="display: flex; gap: 8px; margin-bottom: 8px;">
                        <input type="text" placeholder="Medication Name" class="med-name" style="flex: 2; margin: 0;">
                        <input type="time" class="med-time" style="flex: 1.5; margin: 0;"> 
                    </div>
                </div>
                <button type="button" class="btn-add-med" onclick="addNewLoginMedRow()">+ Add Another Medication</button>
            </div>

            <button type="submit" class="btn-primary">Login to Dashboard</button>
        </form>
        
        <p class="footer-link">
            New to Air Guard? <a href="signup.html">Create Account</a>
        </p>
    </div>

    <script>
        // Function to dynamically add rows, exactly like signup
        function addNewLoginMedRow() {
            const container = document.getElementById('login-med-input-list');
            const row = document.createElement('div');
            row.className = 'med-row';
            row.style.display = 'flex';
            row.style.gap = '8px';
            row.style.marginBottom = '8px';
            row.innerHTML = `
                <input type="text" placeholder="Medication Name" class="med-name" style="flex: 2; margin: 0;">
                <input type="time" class="med-time" style="flex: 1.5; margin: 0;">
            `;
            container.appendChild(row);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;

            const storedEmail = localStorage.getItem("email");
            const storedPass = localStorage.getItem("password");

            if (email === storedEmail && pass === storedPass) {
                
                // --- MULTI-MED CAPTURE LOGIC ---
                const medicationsToAdd = [];
                const rows = document.querySelectorAll('.med-row');
                
                rows.forEach(row => {
                    const name = row.querySelector('.med-name').value;
                    const time = row.querySelector('.med-time').value;
                    if (name && time) {
                        medicationsToAdd.push({ name: name, time: time });
                    }
                });

                if (medicationsToAdd.length > 0) {
                    // Fetch existing meds and push new ones to the list
                    let existingMeds = JSON.parse(localStorage.getItem("medications")) || [];
                    const updatedMedsList = [...existingMeds, ...medicationsToAdd];
                    localStorage.setItem("medications", JSON.stringify(updatedMedsList));
                }

                window.location.href = 'risk.html';
            } else {
                alert("Invalid email or password. Please check your credentials.");
            }
        });
    </script>
</body>
</html>
