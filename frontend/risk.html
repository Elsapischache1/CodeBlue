<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Guard - Risk Assessment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="tel:911" class="sos-btn">SOS</a>
    
    <div class="internal-header">
        <a href="home.html"><img src="logo.png" class="header-logo" alt="Air Guard"></a>
        <h2 style="margin-top: 10px;">Symptom Check</h2>
    </div>

    <div class="main-content" style="justify-content: center;">
        <div class="card-container" style="max-width: 550px; flex: none;">
            <h3 style="color: var(--darkest-green); margin-bottom: 10px;">How are you feeling?</h3>
            <p style="color: #666; margin-bottom: 25px;">Select any symptoms you are currently experiencing.</p>
            
            <div class="selection-grid">
                <label class="check-card"><input type="checkbox"> Coughing at night</label>
                <label class="check-card"><input type="checkbox"> Coughing while workout</label>
                <label class="check-card"><input type="checkbox"> Tightness in Chest</label>
                <label class="check-card"><input type="checkbox"> Shortness in Breath</label>
                <label class="check-card"><input type="checkbox"> Trouble Talking</label>
                <label class="check-card"><input type="checkbox"> Panic/Anxiety</label>
                <label class="check-card"><input type="checkbox"> Fatigue</label>
                <label class="check-card"><input type="checkbox"> Chest Pain</label>
            </div>

            <button onclick="location.href='result.html'" class="btn btn-primary" style="margin-top: 20px;">Analyze My Risk</button>
        </div>
    </div>
</body>
</html>
